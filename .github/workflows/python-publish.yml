name: Publish Python Package

on:
    release:
        types: [published]

permissions:
  contents: read

jobs:
    release-build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
    
        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"

        - name: Build release distributions
          run: |
            python -m pip install --upgrade build twine
            python -m build
            python -m twine check dist/*

        - name: Verify wheel contains package files
          run: |
            python - <<'PY'
            import pathlib
            import zipfile

            wheels = sorted(pathlib.Path("dist").glob("*.whl"))
            if not wheels:
                raise SystemExit("No wheel produced in dist/")

            wheel_path = wheels[0]
            with zipfile.ZipFile(wheel_path) as wheel:
                names = set(wheel.namelist())

            required = {
                "di_unit_of_work/__init__.py",
                "di_unit_of_work/session_aspect.py",
            }
            missing = sorted(required - names)
            if missing:
                raise SystemExit(
                    f"Wheel {wheel_path.name} is missing expected package files: {missing}"
                )
            PY

        - name: Verify wheel import from isolated install
          run: |
            python -m pip install --upgrade pip
            python -m pip install --no-deps --target /tmp/di_unit_of_work_pkg dist/*.whl
            python - <<'PY'
            import sys
            sys.path.insert(0, "/tmp/di_unit_of_work_pkg")

            import di_unit_of_work

            print(di_unit_of_work.__file__)
            PY
    
        - name: Upload distributions
          uses: actions/upload-artifact@v4
          with:
            name: release-dists
            path: dist/

    pypi-publish:
      runs-on: ubuntu-latest
      needs: [release-build]
      permissions:
        id-token: write
      environment:
        name: pypi
        url: https://pypi.org/project/di-unit-of-work/
      steps:
        - name: Retrieve release distributions
          uses: actions/download-artifact@v4
          with:
            name: release-dists
            path: dist/
    
        - name: Publish release distributions to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
          with:
            packages-dir: dist/
